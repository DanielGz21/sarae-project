      <stop offset="0%" stop-color="#D4909A" />
      <stop offset="100%" stop-color="#C9A96E" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4909A" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#D4909A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="#0A0708" rx="120" />
  
  <circle cx="256" cy="256" r="180" fill="url(#glow)" />
